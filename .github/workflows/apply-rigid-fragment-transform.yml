name: Apply rigid fragment transform correction

on:
  push:
    branches: [dev]
    paths:
      - .github/workflows/apply-rigid-fragment-transform.yml

permissions:
  contents: write

jobs:
  apply-correction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Replace coordinate-shearing fragment placement
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('packages/generator-core/src/deepTimePipeline.ts')
          text = path.read_text(encoding='utf-8')

          import_anchor = "import { applyBasinAwareCirculation } from './basinCirculation';\n"
          transform_import = """import {
            buildRotationBetweenUnitVectors,
            buildTangentSphericalRotation,
            rotateUnitVector,
            unitVectorToLonLat
          } from './fragmentSphericalTransform';
          """
          if transform_import not in text:
            if import_anchor not in text:
              raise SystemExit('Could not locate deep-time import anchor')
            text = text.replace(import_anchor, import_anchor + transform_import, 1)

          find_start = text.index('function findUnclaimedTransformTarget(')
          find_end = text.index('\nfunction applyAuthoritativeFragmentTransforms(', find_start)
          replacement_find = """function findBestUnclaimedTransformTarget(
            topology: CubedSphereTopology,
            initialTarget: number,
            targetClaims: Uint8Array,
            targetVector: { x: number; y: number; z: number },
            maxDepth = 3
          ): number {
            if (!targetClaims[initialTarget]) return initialTarget;
            const queueCells = [initialTarget];
            const queueDepths = [0];
            const visited = new Set<number>([initialTarget]);
            let head = 0;
            let bestCell = -1;
            let bestAlignment = Number.NEGATIVE_INFINITY;
            while (head < queueCells.length) {
              const cell = queueCells[head];
              const depth = queueDepths[head];
              head += 1;
              if (!targetClaims[cell]) {
                const alignment =
                  topology.positions[cell * 3] * targetVector.x +
                  topology.positions[cell * 3 + 1] * targetVector.y +
                  topology.positions[cell * 3 + 2] * targetVector.z;
                if (alignment > bestAlignment + 1e-12 || (Math.abs(alignment - bestAlignment) <= 1e-12 && (bestCell < 0 || cell < bestCell))) {
                  bestCell = cell;
                  bestAlignment = alignment;
                }
              }
              if (depth >= maxDepth) continue;
              for (let direction = 0; direction < 4; direction += 1) {
                const neighbor = topology.neighbors[cell * 4 + direction];
                if (neighbor < 0 || visited.has(neighbor)) continue;
                visited.add(neighbor);
                queueCells.push(neighbor);
                queueDepths.push(depth + 1);
              }
            }
            return bestCell;
          }
          """
          text = text[:find_start] + replacement_find + text[find_end:]

          transform_start = text.index('    const centroidLatitude = Math.asin(clamp(seed.y, -1, 1));')
          transform_end = text.index('      let targetCell = desiredTarget;', transform_start)
          replacement_transform = """    const rotation = buildTangentSphericalRotation(
              { x: seed.x, y: seed.y, z: seed.z },
              motionX,
              motionY,
              displacement
            );
            if (displacement > 0) movingFragmentCount += 1;
            displacementTotal += displacement;
            maxDisplacement = Math.max(maxDisplacement, displacement);
            for (const sourceCell of seed.cells) {
              const rotatedTarget = rotateUnitVector(
                {
                  x: topology.positions[sourceCell * 3],
                  y: topology.positions[sourceCell * 3 + 1],
                  z: topology.positions[sourceCell * 3 + 2]
                },
                rotation
              );
              const targetCoordinates = unitVectorToLonLat(rotatedTarget);
              const desiredTarget = cubedSphereCellForLonLat(topology, targetCoordinates.longitude, targetCoordinates.latitude);
          """
          text = text[:transform_start] + replacement_transform + text[transform_end:]

          old_spill = '        const spillTarget = findUnclaimedTransformTarget(topology, desiredTarget, targetClaims, 3);'
          new_spill = """        const spillTarget = findBestUnclaimedTransformTarget(
                  topology,
                  desiredTarget,
                  targetClaims,
                  rotatedTarget,
                  3
                );"""
          if old_spill not in text:
            raise SystemExit('Could not locate fragment collision spill call')
          text = text.replace(old_spill, new_spill, 1)

          text = text.replace(
            "    'All captured continental fragments are placed, including near-stationary fragments which use identity transforms.',\n    'Overlapping target claims search up to three topology steps for an unclaimed spill cell before merging relief at the collision target.',",
            "    'All captured continental fragments use one rigid three-dimensional spherical rotation, including near-stationary fragments which use identity transforms.',\n    'Overlapping target claims search the local topology neighborhood and choose the unclaimed cell with the best angular fit before merging relief at the collision target.',",
            1
          )

          preview_start = text.index('    const longitudeDelta = wrappedAngle(last.longitudeRadians - first.longitudeRadians);')
          preview_end = text.index('    resolvedRecords += 1;', preview_start)
          replacement_preview = """    const rotation = buildRotationBetweenUnitVectors(
              vectorFromLonLat(first.longitudeRadians, first.latitudeRadians),
              vectorFromLonLat(last.longitudeRadians, last.latitudeRadians)
            );
          """
          text = text[:preview_start] + replacement_preview + text[preview_end:]

          old_preview_target = """      const targetLongitude = wrappedAngle(topology.longitudes[sourceCell] + longitudeDelta);
                const targetLatitude = clamp(topology.latitudes[sourceCell] + latitudeDelta, -Math.PI / 2 + 0.000001, Math.PI / 2 - 0.000001);
                const targetCell = cubedSphereCellForLonLat(topology, targetLongitude, targetLatitude);"""
          new_preview_target = """      const rotatedTarget = rotateUnitVector(
                  {
                    x: topology.positions[sourceCell * 3],
                    y: topology.positions[sourceCell * 3 + 1],
                    z: topology.positions[sourceCell * 3 + 2]
                  },
                  rotation
                );
                const targetCoordinates = unitVectorToLonLat(rotatedTarget);
                const targetCell = cubedSphereCellForLonLat(topology, targetCoordinates.longitude, targetCoordinates.latitude);"""
          if old_preview_target not in text:
            raise SystemExit('Could not locate stored-history preview target mapping')
          text = text.replace(old_preview_target, new_preview_target, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-rigid-fragment-transform.yml').unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify correction
        run: npm run verify

      - name: Commit correction to dev
        shell: bash
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use rigid spherical fragment placement"
          git push origin HEAD:dev
