    name: Generator Core
    status: planned
    owner_area: generation
    responsibility: Deterministic procedural generation pipeline and domain models independent of UI.
    dependencies: []
  - id: shared
    name: Shared
    status: planned
    owner_area: platform
    responsibility: Types, schema validation, units, coordinate helpers, and data contracts shared across packages.
