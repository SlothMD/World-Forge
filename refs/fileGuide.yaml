version: 1
schema: refs/schemas/schemaRegistry.yaml
purpose: Agent-readable guide for initializing a project refs folder.
rules:
  - Keep entries factual, current, and concise.
  - Prefer project-neutral schemas that are easy for code agents to parse.
  - Use YAML for structured state and Markdown for explanatory prose.
  - Do not store secrets in refs.
files:
  agents.yaml: Agent operating instructions, required reading order, and project-specific constraints.
  templatePolicy.yaml: Template placeholder policy, required files, bootstrap files, and validation rules.
  schemas/schemaRegistry.yaml: Machine-readable schema hints used by the refs validator.
  MAINTENANCE.md: Framework maintainer guidance for adding files, changing schemas, and documenting migrations.
  examples/: Generic examples that are not source-of-truth for copied projects.
  project.yaml: Project identity, purpose, stack, repository layout, source-of-truth links, and open questions.
  planning/roadmap.yaml: Major work lanes, horizons, statuses, and sequencing.
  planning/todos.yaml: Durable task list with ids, statuses, areas, and summaries.
  planning/milestones.yaml: Milestones, exit criteria, and release gates.
  planning/decisions.yaml: Accepted decisions, rationale, date, and consequences.
  planning/risks.yaml: Known risks, severity, mitigation, and owner if known.
  planning/assumptions.yaml: Working assumptions that should be revisited when facts change.
  planning/openQuestions.yaml: Unresolved questions that affect implementation or product direction.
  architecture/overview.md: Plain-language architecture summary.
  architecture/stack.yaml: Languages, frameworks, runtimes, build tools, and package managers.
  architecture/modules.yaml: Module map with responsibilities, status, dependencies, and source paths.
  architecture/dataFlow.md: How data enters, moves through, and exits the system.
  architecture/integrationMap.yaml: Internal/external integration map and boundary notes.
  architecture/boundaries.yaml: Ownership and safety boundaries between modules, processes, and data stores.
  architecture/localVsHosted.md: What runs locally, what may be hosted, and what must stay portable.
  product/vision.md: Product thesis, core promise, audience, and success shape.
  product/personas.yaml: User/persona list with needs and constraints.
  product/useCases.yaml: Primary user workflows and job stories.
  product/featureCatalog.yaml: Feature list with status and short descriptions.
  product/workflows.yaml: Step-by-step workflows users or agents must support.
  product/glossary.yaml: Project terms and definitions.
  implementation/codingStandards.md: Coding style, safety, quality, and review standards.
  implementation/repoConventions.md: Repo layout, naming, and contribution conventions.
  implementation/fileMap.yaml: Important files, source roots, and where to look for common tasks.
  implementation/configSchema.yaml: Config files, schema notes, portable versus machine-local fields.
  implementation/envVars.example: Safe example environment variables with no real secrets.
  implementation/dependencyPolicy.md: Dependency approval, versioning, and external tool policy.
  handoffs/handoffTemplate.md: Template for future handoff notes.
  handoffs/currentHandoff.md: Current state, validation, known gaps, and next useful actions.
  handoffs/implementationLog.yaml: Chronological implementation entries.
  handoffs/changeLog.yaml: Human-readable changes to refs/project state.
  testing/testStrategy.md: Testing philosophy and layers.
  testing/acceptanceCriteria.yaml: Durable acceptance criteria for important workflows.
  testing/smokeTests.yaml: Fast manual or automated smoke tests.
  testing/regressionChecklist.md: Checklist for preventing known regressions.
  testing/validationCommands.yaml: Commands agents should run and what they verify.
  UI/uiStyle.yaml: UI style rules and layout principles.
  UI/designTokens.yaml: Colors, spacing, typography, and shared UI constants.
  UI/components.yaml: Reusable component guidance and expected behaviors.
  UI/screenPatterns.yaml: Common screen layouts and information architecture patterns.
  UI/interactionRules.yaml: Input, browse, selection, progress, and long-running-job rules.
  UI/accessibility.yaml: Accessibility standards and project-specific requirements.
  data/assetManifest.schema.yaml: Asset manifest schema and required metadata.
  data/jobManifest.schema.yaml: Batch job manifest schema.
  data/auditLog.schema.yaml: Audit log format and fields.
  data/metadataSchema.yaml: Shared metadata structures and field definitions.
  integrations/comfyui.yaml: ComfyUI connection assumptions and config fields, if relevant.
  integrations/blender.yaml: Blender automation assumptions and config fields, if relevant.
  integrations/ollama.yaml: Ollama/local LLM assumptions and config fields, if relevant.
  integrations/imagemagick.yaml: ImageMagick assumptions and config fields, if relevant.
  integrations/gltfTransform.yaml: glTF Transform assumptions and config fields, if relevant.
  integrations/gltfpack.yaml: gltfpack assumptions and config fields, if relevant.
  operations/localSetup.md: How to set up the project locally.
  operations/machineProfiles.yaml: Machine-local capabilities and tool profiles.
  operations/troubleshooting.md: Common failures and fixes.
  operations/releaseChecklist.md: Release/package checklist.
  operations/backupAndSync.md: Backup, sync, and portability policy.
