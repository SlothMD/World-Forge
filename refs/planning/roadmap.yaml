roadmap:
  - id: slice-0-technical-proof
    horizon: now
    status: done
    summary: Deterministic seeded generation, wrapped sample grid, basic elevation, land/water split, PNG export, and JSON config export.
  - id: slice-1-planet-foundation
    horizon: next
    status: done
    summary: Solar system stub, primary world config, ocean percentage, sea level, simplified plate regions, plate-influenced elevation, basic mountains, save/load, and map viewer.
  - id: slice-2-climate-hydrology
    horizon: next
    status: done
    summary: Temperature bands, required wetness/rainfall model, rain shadows, river routing, basin/lake termination where emergent, ice caps, and biome placement.
  - id: slice-3-export-ready-mvp
    horizon: next
    status: needs-rework
    summary: Current raster-backed MVP is browser-testable, but must migrate generation truth to global topology before release.
  - id: slice-3a-global-topology-foundation
    horizon: now
    status: in_progress
    summary: Replace wrapped equirectangular generation truth with global topology cells, adjacency, spherical coordinates, area weighting, and projection sampling for preview/export layers.
  - id: slice-4-structured-expansion
    horizon: later
    status: planned
    summary: Optional export profiles such as GeoJSON, CSV/tile data, Markdown summary, Godot, Tiled, and Civ-style abstractions after global-topology fundamentals hold.
