version: 1
schema: refs/schemas/schemaRegistry.yaml
updated: 2026-06-24
todos:
  - id: scaffold-monorepo
    status: done
    area: architecture
    summary: Scaffold TypeScript-first package layout with generator-core, renderer, exporters, shared types, and desktop shell boundary.
  - id: define-core-schemas
    status: done
    area: data
    summary: Define Project, GenerationConfig, SolarSystem, PrimaryWorld, MapLayer, and ExportManifest types plus JSON schema.
  - id: implement-seeded-random
    status: done
    area: generation
    summary: Implement deterministic seeded PRNG and require all random generation to flow through it.
  - id: implement-world-coordinate-api
    status: done
    area: generation
    summary: Implement wrapped equirectangular coordinate, neighbor, latitude, longitude, and resampling helpers.
  - id: define-package-format
    status: done
    area: persistence
    summary: Define .wforge zip package manifest, layer storage, schema versioning, and load compatibility behavior.
  - id: write-golden-seed-tests
    status: done
    area: testing
    summary: Add deterministic fixtures covering default, dry, wet, hot, cold, high-ocean, low-ocean, and mountain-heavy worlds.
  - id: smooth-map-output
    status: open
    area: rendering
    summary: Add post-process smoothing passes for elevation, water masks, and biome/wetness classification to reduce chunky geometry and speckled coastlines.
  - id: add-terrain-noise-detail
    status: open
    area: generation
    summary: Add layered noise and boundary perturbation so continents, mountains, and climate zones are not dominated by straight Voronoi plate geometry.
  - id: add-terrain-evolution-aging
    status: open
    area: generation
    priority: high
    summary: Add planet-age-driven terrain evolution after tectonic uplift, including thermal weathering, hydraulic erosion approximation, sediment/deposition, basin shaping, and final hydrology over aged terrain.
    notes:
      - High-value naturalism feature; should happen before deeper visual polish.
      - Young worlds should preserve sharper uplift and rougher mountains.
      - Older worlds should have more rounded terrain, mature drainage basins, coastal shelves, and sedimented lowlands.
      - Prioritize plausible, cohesive world feel over first-pass performance; add fallback heuristics only when bottlenecks are measured.
  - id: high-res-generation-downsample
    status: open
    area: rendering
    summary: Support high internal generation/export resolutions such as 2048x1024 or 4096x2048, then downsample for responsive preview rendering.
  - id: improve-river-shape
    status: open
    area: hydrology
    summary: Replace straight fallback river paths with noise-influenced meandering drainage paths that still validate as downhill.
  - id: split-resolution-controls
    status: open
    area: ui
    summary: Separate generation resolution, display scale, and export resolution controls.
