version: 1
schema: refs/schemas/schemaRegistry.yaml
updated: 2026-06-29
todos:
  - id: scaffold-monorepo
    status: done
    area: architecture
    summary: Scaffold TypeScript-first package layout with generator-core, renderer, exporters, shared types, and desktop shell boundary.
  - id: define-core-schemas
    status: done
    area: data
    summary: Define Project, GenerationConfig, SolarSystem, PrimaryWorld, MapLayer, and ExportManifest types plus JSON schema.
  - id: implement-seeded-random
    status: done
    area: generation
    summary: Implement deterministic seeded PRNG and require all random generation to flow through it.
  - id: implement-world-coordinate-api
    status: done
    area: generation
    summary: Implement wrapped equirectangular coordinate, neighbor, latitude, longitude, and resampling helpers.
  - id: define-package-format
    status: done
    area: persistence
    summary: Define .wforge zip package manifest, layer storage, schema versioning, and load compatibility behavior.
  - id: write-golden-seed-tests
    status: done
    area: testing
    summary: Add deterministic fixtures covering default, dry, wet, hot, cold, high-ocean, low-ocean, and mountain-heavy worlds.
  - id: smooth-map-output
    status: done
    area: rendering
    summary: Add post-process smoothing passes for elevation, water masks, and biome/wetness classification to reduce chunky geometry and speckled coastlines.
  - id: add-terrain-noise-detail
    status: done
    area: generation
    summary: Add layered noise and boundary perturbation so continents, mountains, and climate zones are not dominated by straight Voronoi plate geometry.
  - id: add-terrain-evolution-aging
    status: done
    area: generation
    priority: high
    summary: Add planet-age-driven terrain evolution after tectonic uplift, including thermal weathering, hydraulic erosion approximation, sediment/deposition, basin shaping, and final hydrology over aged terrain.
    notes:
      - High-value naturalism feature; should happen before deeper visual polish.
      - Young worlds should preserve sharper uplift and rougher mountains.
      - Older worlds should have more rounded terrain, mature drainage basins, coastal shelves, and sedimented lowlands.
      - Prioritize plausible, cohesive world feel over first-pass performance; add fallback heuristics only when bottlenecks are measured.
  - id: high-res-generation-downsample
    status: done
    area: rendering
    summary: Support high internal generation/export resolutions such as 2048x1024 or 4096x2048, then downsample for responsive preview rendering.
  - id: improve-river-shape
    status: done
    area: hydrology
    summary: Replace straight fallback river paths with noise-influenced meandering drainage paths that still validate as downhill.
  - id: split-resolution-controls
    status: done
    area: ui
    summary: Separate generation resolution, display scale, and export resolution controls.
  - id: design-global-topology-model
    status: done
    area: architecture
    priority: high
    summary: Choose and document the authoritative primary-world topology model, including cell ids, spherical coordinates, area weights, adjacency, distance, and projection sampling contracts.
    notes:
      - Prefer geodesic or cubed-sphere topology over a flat wrapped raster.
      - Equirectangular layers should become projected views, not generation truth.
      - Include migration behavior for existing .wforge packages generated with raster-backed worlds.
  - id: implement-topology-core
    status: done
    area: generation
    priority: high
    summary: Implement deterministic topology construction, neighbor lookup, spherical distance, latitude/longitude lookup, and cell-area weighting in shared/generator APIs.
    notes:
      - Initial implementation uses cubed-sphere topology.
      - Topology elevation and plate layers are persisted in JSON/.wforge.
      - Additional distance/interpolation quality improvements may be needed as more subsystems migrate.
  - id: migrate-generation-to-topology
    status: in_progress
    area: generation
    priority: high
    summary: Move plates, elevation, climate, hydrology, ice, biomes, lakes, and rivers from raw x/y raster loops to topology-cell algorithms.
    notes:
      - Plate assignment and initial elevation now run on topology cells, then project to equirectangular layers.
      - Landmass shape now uses continent/island fields rather than plate membership as the primary land/ocean driver.
      - Water masks, climate/wetness, hydrology, rivers, lakes, ice, and biomes now originate on topology layers and project to raster views.
      - Continent/craton region count is user-adjustable, with count-scaled, multi-lobed region footprints for less regular high-resolution landmasses.
      - First primordial/plate-history pass exists: lumpy pre-plate terrain, crust age/thickness, early impacts, Poisson-like plate seeds, warped plate regions, and motion-aware boundary effects.
      - Remaining follow-up: richer wind/current modeling, topology-native terrain aging refinements, tributary hierarchy quality, and projected river path readability.
  - id: implement-projection-sampling
    status: in_progress
    area: rendering
    priority: high
    summary: Project topology-cell world facts into equirectangular preview/export layers without introducing seam or polar artifacts.
    notes:
      - Initial nearest-cell projection exists for elevation and plates.
      - Interpolation and subsystem-specific projected artifacts remain follow-up work.
      - Prioritize export/persistence quality over speed; preview may use a faster path if a measured quality fallback exists for saved/exported outputs.
      - Use user-selected visually good seeds as regression samples once identified.
  - id: split-topology-vs-projection-tests
    status: open
    area: testing
    priority: high
    summary: Add deterministic tests for topology data separately from projected raster render/export output.
  - id: audit-long-term-dead-ends
    status: open
    area: architecture
    priority: medium
    summary: Review current shortcuts that could become dead ends, including renderer-derived facts, export profile coupling, JSON/package schema evolution, resource/game-rule coupling, moon/tide simplification, and performance-driven fallbacks.
  - id: evaluate-procedural-layer-stack
    status: in_progress
    area: generation
    priority: medium
    summary: Evaluate adding a serializable post-process/procedural detail layer stack inspired by ProceduralTerrains, constrained to operate over authoritative topology facts rather than replacing process-based generation.
    notes:
      - First scoped enrichment pass exists in generator-core with ridged detail, dry highland strata/terracing, and masked broad undulation over topology elevation.
      - Candidate layer types: ridged uplift detail, canyon/terrace strata, dune fields, craters, local flow-channel carving, albedo/detail masks.
      - Keep tectonics, hydrology, climate, and biomes as canonical simulation outputs; layer stacks should enrich or style them with explicit masks.
      - Consider CPU sampler parity tests if any generated layer is also rendered or exported through a shader path.
  - id: add-3d-globe-view
    status: in_progress
    area: rendering
    priority: high
    summary: Add an interactive 3D globe view of generated worlds without making the renderer authoritative.
    notes:
      - First Three.js globe viewer exists in the desktop app, textured by the existing map renderer and vertex-displaced from generated elevation.
      - Globe smoke checks passed at desktop and mobile viewports.
      - Globe displacement should stay presentation-scaled and subtle; terrain is intentionally not drawn at diagnostic/exaggerated height.
      - Follow-up: code-split Three.js, expose globe layer controls, add atmosphere/cloud presentation, and consider direct topology rendering for future non-equirectangular views.
  - id: optimize-topology-generation
    status: in_progress
    area: performance
    priority: high
    summary: Optimize high-resolution topology generation after primordial/plate-history terrain improvements.
    notes:
      - Default seed 1001001 at 2048x1024 is stamped in refs/benchmarks/defaultSeedBaseline.md.
      - First optimization pass reduced local 2048x1024 generation from about 38.8 seconds to about 23.7 seconds while preserving about 69.7% ocean and 51 named rivers.
      - Full-array percentile sorts were replaced with histogram percentiles; continent crust-field generation now skips region/lobe math outside each region influence.
      - Current major hotspots are topology.terrain.crust-fields and topology.hydrology; profile before changing hydrology algorithms.
      - Generate now runs in a Worker after startup with an estimated progress indicator so long High-resolution runs keep the UI responsive.
      - Preserve visual quality of the primordial/plate-history pass while reducing repeated all-cell scans and boundary loops.
  - id: add-space-presentation
    status: open
    area: rendering
    priority: medium
    summary: Add globe scene presentation features including clouds, atmosphere, sun, moons, and day/night cycle.
    notes:
      - Clouds and atmosphere are visual layers over canonical world data.
      - Sun/moon positions should use generated solar-system fields where available and remain deterministic by seed/time.
      - Day/night cycle should affect lighting only unless/until climate simulation consumes time-of-day.
      - Add an atmospheric overlay to globe view as an early visual slice.
  - id: improve-coastline-readability
    status: open
    area: rendering
    priority: medium
    summary: Tone up coastline presentation so shorelines read clearly without making coastline styling authoritative world data.
    notes:
      - Best-practice direction: add a subtle shore halo/edge-light and shallow-water shelf band derived from existing water/coast facts rather than changing biome colors.
      - Keep the effect optional or theme-driven so diagnostic heightmap/elevation filters remain truthful.
      - Consider separate treatments for 2D map, globe albedo texture, and future tile export previews.
      - Avoid thick outlines that visually imply political borders or plate boundaries.
      - First pass can use the suggested shelf band plus subtle landward light edge, but visual styling should become configurable with several compact options.
      - Keep UI compact: prefer one small map/view settings menu over persistent button sprawl so focus remains on the map.
  - id: add-map-zoom-controls
    status: open
    area: ui
    priority: high
    summary: Add zoom in/out and pan controls for the 2D map preview.
    notes:
      - Include buttons and wheel/trackpad support, with reset-to-fit.
      - Preserve export resolution semantics; zoom is a viewport interaction only.
      - Keep overlay hit targets and legends readable at zoomed scales.
      - Mouse wheel zoom should be enabled by default.
      - Left-click drag pans the 2D map.
      - Middle-click drag is reserved for tilt-style navigation where the current view supports it.
      - Keyboard controls should be mappable; first default set is W/A/S/E for pan, Q/E or equivalent for rotate/tilt where relevant, and +/- for zoom.
      - Zoom state is session-only for the first pass.
  - id: collapsible-side-panels
    status: open
    area: ui
    priority: medium
    summary: Make the generation controls and World info panel collapsible so the map remains the primary focus.
    notes:
      - Preserve quick access to Generate, view mode, and map settings while collapsed.
      - Avoid hiding active warnings or generation progress.
      - This pairs naturally with compact view-settings menus for coastline/overlay options.
  - id: add-3d-map-view
    status: deferred
    area: rendering
    priority: medium
    summary: Add a 3D terrain map view after texture/detail handling is robust enough for close inspection.
    notes:
      - Distinct from the globe view: this should be a navigable terrain/map view using generated texture/detail layers.
      - Defer until coastline, terrain texture, normal/detail, and scale handling are mature.
      - Use non-authoritative presentation geometry over topology/world facts, not renderer-derived simulation data.
  - id: add-post-generate-tile-map
    status: in_progress
    area: export
    priority: high
    summary: Add a post-generation action that derives a configurable tiled map from the generated world.
    notes:
      - UI should expose a button after world generation, separate from primary planet generation, so users can generate tile abstractions on demand.
      - Tile map size should be configurable with custom width/height and presets matching Civ 7 map sizes where legally/practically appropriate.
      - First tile profile should target Civ-style terrain abstraction, starting with Civ 7 terrain types and features as the initial mapping vocabulary.
      - Tile generation should resample authoritative topology/world facts rather than re-generating a separate world.
      - Output should preserve seed, source world id, tile profile, tile dimensions, source projection/topology metadata, and terrain/feature legend.
      - Keep this as a generic tile export/profile system; do not hardwire the core generator to Civ-specific gameplay rules.
      - First slice implemented shared hex tile-map types, a Civ 7-style profile, editable Civ 7-style size presets, SVG hex-grid export, structured tile JSON export, and UI controls for dimensions/features.
      - Exact Civ 7 map-size dimensions and map-script APIs still need verification against shipped/modding data before treating presets as canonical.
  - id: add-content-configuration
    status: in_progress
    area: configuration
    priority: high
    summary: Add user-editable content sets for biomes, tiles, features, and resources before cutting generation/export to data-driven rules.
    notes:
      - First slice added shared content-pack schema and default sets for current biomes, Civ 7-style tiles/features, and initial Civ 7 resource names.
      - Left-panel gear opens a modal for browsing categories, selecting sets, marking defaults, copying members between sets, inspecting mapping rules, editing preview color/asset values, and uploading texture/icon assets.
      - Current generator/exporter still use hardcoded rules; next cutover should consume default content sets category by category.
      - Additional future categories worth considering: improvements, natural wonders, yields, starts/spawns, labels/naming, and regional style palettes.
      - Feature defaults need rough, volcano, and tropical added to the feature vocabulary/config.
      - Build non-terrestrial terrain sets for moons and worlds outside the habitable zone.
  - id: add-user-cloud-sync
    status: in_progress
    area: persistence
    priority: high
    summary: Add lightweight user awareness and cross-machine persistence for settings and user-attached content assets.
    notes:
      - First slice follows the EcoMoguls local-first pattern: a local profile is created immediately, `Keep data synced` defaults on, and remote calls only happen when a service URL is configured.
      - The desktop app now persists identity, generation config, content library assets, hex export settings, and a bounded saved-map library in local browser/Tauri storage.
      - Cloud sync uses the existing studio identity service contract: `POST /api/identity/register`, `PATCH /api/identity/me`, and authenticated `GET`/`PUT /api/world-forge/user-sync/{profileId}` with `X-Player-Id` / `X-Player-Token`.
      - Generated/opened worlds are remembered in saved maps and included in the sync envelope; `.wforge` packages remain the explicit portable/export artifact.
      - Minimum backend delta is one World Forge JSONB sync table and two authenticated routes; see refs/architecture/userSync.md.
      - Premium/account entitlements should layer on top of the profile/service boundary later, not block this local-first persistence path.
      - Conflict strategy is last-write-wins for the first backend slice.
      - `D:\Apps\Crawl-Space` was identified as the expected source for relevant deployment tooling/credentials, but the local working tree currently only contains `.git`; private values should remain in TWS References or deployment secrets, not this public repo.
      - Do not store full generated map payloads in localStorage; High-resolution worlds exceed browser quota. Use metadata locally until IndexedDB and/or backend blob storage is added for full saved-map sync.
  - id: background-secondary-moons
    status: open
    area: performance
    priority: medium
    summary: Hand off secondary moon generation to a background process.
    notes:
      - Keep primary world generation responsive while optional moon detail is computed.
      - Preserve deterministic seed linkage between primary world, system body, and generated moon detail.
  - id: background-detail-map
    status: open
    area: performance
    priority: low
    summary: Hand off detailed map finer-detail generation to a background process.
    notes:
      - Longer-term follow-up after the main world pipeline and export configs stabilize.
      - Candidate workload includes high-resolution detail maps, local texture masks, and export-grade terrain decoration.
