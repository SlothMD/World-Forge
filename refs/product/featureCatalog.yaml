version: 1
schema: refs/schemas/schemaRegistry.yaml
updated: 2026-06-29
features:
  - id: deterministic-generation
    status: active
    summary: Same seed and config reproduce the same world data.
  - id: solar-system-context
    status: active
    summary: Generate star, system age, major bodies, primary world placement, moons, visible bodies, and simple moon tide/climate influence.
  - id: primary-world-map
    status: active
    summary: Generate one detailed primary planet with plate-influenced elevation, water, climate, hydrology, biomes, and ice.
  - id: project-package
    status: active
    summary: Save and reopen zipped .wforge packages containing manifest and layer data.
  - id: core-exports
    status: active
    summary: Export PNG, simplified SVG, and structured JSON.
  - id: future-export-profiles
    status: deferred
    summary: Add GeoJSON, CSV/tile, Godot, Tiled, Civ-like, and VTT export profiles after MVP.
  - id: post-generate-tile-map
    status: active
    summary: Generate a configurable hex tiled abstraction from an existing generated world, with editable Civ 7-style size presets and initial Civ-style terrain/feature mapping.
  - id: content-configuration
    status: active
    summary: Configure content sets for biomes, tiles, features, and resources before the generator/exporters fully consume data-driven definitions.
  - id: local-profile-cloud-sync
    status: active
    summary: Maintain a local user profile, keep data sync enabled by default under Config, persist settings/assets/saved maps locally, and automatically sync them through the configured studio identity service after sign-in.
