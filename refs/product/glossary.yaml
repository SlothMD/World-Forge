version: 1
schema: refs/schemas/schemaRegistry.yaml
updated: 2026-06-24
terms:
  - term: .wforge
    definition: Working project package extension for zipped World Forge saves containing manifest and layer data.
  - term: global topology
    definition: Authoritative primary-world cell graph with spherical coordinates, adjacency, distance, and area weighting used for generation before projection.
  - term: equirectangular projection layer
    definition: Derived rectangular map view projected from global topology for preview, PNG, SVG, JSON, and compatibility exports.
  - term: export profile
    definition: A format-specific exporter that serializes or resamples generated world data without changing generation logic.
  - term: golden seed
    definition: Fixed seed/config fixture used for deterministic regression tests.
